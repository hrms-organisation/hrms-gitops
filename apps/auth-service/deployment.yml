apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hrms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ihab0/auth-service:latest
          ports:
            - containerPort: 8092
          env:
            - name: KEYCLOAK_SERVER_URL
              value: "http://keycloak.platform:8080"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.platform:9092"
