apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: hrms-apps
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hrms-organisation/hrms-gitops.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: hrms

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true