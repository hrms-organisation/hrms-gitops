apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hrms-databases
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hrms-organisation/hrms-gitops.git
    targetRevision: main
    path: databases

  destination:
    server: https://kubernetes.default.svc
    namespace: databases

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
