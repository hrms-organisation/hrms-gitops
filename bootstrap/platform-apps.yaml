apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hrms-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hrms-organisation/hrms-gitops
    targetRevision: main
    path: platform

  destination:
    server: https://kubernetes.default.svc
    namespace: platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
