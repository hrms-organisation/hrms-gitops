apiVersion: apps/v1
kind: Deployment
metadata:
  name: clamav
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
        - name: clamav
          image: clamav/clamav:latest
          ports:
            - containerPort: 3310
          volumeMounts:
            - name: clamav-storage
              mountPath: /var/lib/clamav
          livenessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 120
            periodSeconds: 30

      volumes:
        - name: clamav-storage
          persistentVolumeClaim:
            claimName: clamav-pvc